<!DOCTYPE html>
<html>

<head>
    <title>Online Component</title>

    <script src="https://unpkg.com/jspsych@8.2.1" type="text/javascript"></script>

    <script src="https://unpkg.com/@jspsych/plugin-audio-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-audio-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>


    <script src="onlinecomponent.js"></script>
    <script src="demographics.js"></script>

    <link href="https://unpkg.com/jspsych@8.0.1/css/jspsych.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://unpkg.com/@jspsych/plugin-survey@2.0.0/css/survey.css" />

    <style>
        .blacktext {
            color: rgb(0, 0, 0);
        }
    </style>
</head>

<body></body>

<script>
    // 1. Initialize jsPsych
    var jsPsych = initJsPsych({
        on_finish: function () {
            jsPsych.data.displayData("json") 
        },
        use_webaudio: true,
        override_safe_mode: true
    });

    // 2. Wrap the timeline construction in window.onload to ensure scripts are loaded
    window.onload = function() {
        var timeline = [];

        // Participant ID
        const participantID = jsPsych.randomization.randomID(10);

        // --- A. PREPARATORY STEPS ---
        
        // Fullscreen
        timeline.push({
            type: jsPsychFullscreen,
            fullscreen_mode: true,
        });

        // Consent (from demographics.js)
        if (typeof ConsentForm !== 'undefined') {
            timeline.push(ConsentForm);
        } else {
            console.error("ConsentForm is missing! Check demographics.js");
        }

        timeline.push(demographic_questions);
        // --- B. TASK SHUFFLING ---

        // Prepare PSIQ (from onlinecomponent.js)
        var psiq_shuffled = jsPsych.randomization.shuffleNoRepeats([
            psiq_appearance, 
            psiq_sound, 
            psiq_smell, 
            psiq_taste, 
            psiq_touch, 
            psiq_bodily_sensation, 
            psiq_feeling
        ]);
        var psiq = [psiq_intro, ...psiq_shuffled];

        // Shuffle Task Order (PSIQ vs PCS)
        var order = jsPsych.randomization.shuffleNoRepeats([psiq, pcs_timeline]);

        // --- C. BUILDING THE TIMELINE ---

        timeline.push(order[0]);
        timeline.push(order[1]);

        // Debriefing (from demographics.js) - Added at the end
        if (typeof demographics_debriefing !== 'undefined') {
            timeline.push(demographics_debriefing);
        } else {
            console.error("demographics_debriefing is missing! Check demographics.js");
        }

        // 3. Run the timeline
        jsPsych.run(timeline);
    };
</script>

</html>
