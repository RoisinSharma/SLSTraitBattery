<script>
    // Initialize experiment =================================================
    var timeline = []

    var jsPsych = initJsPsych({
        on_finish: function () {
            jsPsych.data.displayData("json") // CURRENTLY WILL display data in browser- CHANGE TO DATAPIPE OR OTHER METHOD FOR SAVING DATA IN FINAL VERSION
        },
        use_webaudio: true,
        override_safe_mode: true
    })

     // Participant ID
        const participantID = jsPsych.randomization.randomID(10)

        // full screen
        timeline.push({
            type: jsPsychFullscreen,
            fullscreen_mode: true,
        })
        timeline.push(ConsentForm)

    //shuffle =====================================================================
        var psiq_shuffled = jsPsych.randomization.shuffleNoRepeats([psiq_appearance, 
        psiq_sound, 
        psiq_smell, 
        psiq_taste, 
        psiq_touch, 
        psiq_bodily_sensation, 
        psiq_feeling])
        var psiq = [psiq_intro, ...psiq_shuffled]

        var order = jsPsych.randomization.shuffleNoRepeats([psiq, pcs_timeline])

    // Timeline -------------------------------------------------------------------
    timeline.push(order[0])
    timeline.push(order[1])

    //  Run the timeline =====================================================
    jsPsych.run(timeline)
</script>
